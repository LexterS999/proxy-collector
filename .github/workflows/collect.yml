name: 🔄 Daily Proxy Collector

on:
  # Автоматический запуск каждый день в 06:00 UTC
  schedule:
    - cron: "0 6 * * *"

  # Ручной запуск через вкладку Actions → Run workflow
  workflow_dispatch:
    inputs:
      verbose:
        description: "Подробный лог (verbose mode)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write   # нужно для коммита result.txt / results/ обратно в репо

jobs:
  collect:
    name: Collect & Deduplicate Proxies
    runs-on: ubuntu-latest
    timeout-minutes: 60   # geo-запросы к 7000+ хостам занимают время

    steps:
      # ── 1. Клонируем репозиторий ───────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Настраиваем Python ─────────────────────────────────────────────
      - name: 🐍 Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ── 3. Устанавливаем зависимости ──────────────────────────────────────
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Запускаем сборщик ──────────────────────────────────────────────
      - name: 🚀 Run collector
        run: |
          VERBOSE_FLAG=""
          if [ "${{ github.event.inputs.verbose }}" = "true" ]; then
            VERBOSE_FLAG="--verbose"
          fi
          python collector.py \
            --source  source.txt \
            --output  result.txt \
            --results results \
            $VERBOSE_FLAG

      # ── 5. Краткая сводка в интерфейсе Actions ────────────────────────────
      - name: 📊 Print summary
        run: |
          echo "### 📡 Результаты сборки" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          head -30 result.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          TOTAL=$(grep -v '^#' result.txt | grep -c '://' || true)
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Итого уникальных прокси:** $TOTAL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Файлы по протоколам:**" >> $GITHUB_STEP_SUMMARY
          for f in results/*.txt; do
            COUNT=$(grep -c '://' "$f" 2>/dev/null || true)
            echo "- \`$(basename $f)\`: $COUNT" >> $GITHUB_STEP_SUMMARY
          done

      # ── 6. Коммитим result.txt, results/ и лог ────────────────────────────
      - name: 💾 Commit results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 auto: update proxies [$(date +'%Y-%m-%d %H:%M UTC')]"
          file_pattern: "result.txt results/*.txt collector.log"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
