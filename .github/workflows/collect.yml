name: 🔄 Daily Proxy Collector

on:
  # Автоматический запуск каждый день в 06:00 UTC
  schedule:
    - cron: "0 6 * * *"

  # Ручной запуск через вкладку Actions → Run workflow
  workflow_dispatch:
    inputs:
      verbose:
        description: "Подробный лог (verbose mode)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write   # нужно для коммита result.txt обратно в репо

jobs:
  collect:
    name: Collect & Deduplicate Proxies
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Клонируем репозиторий ───────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Настраиваем Python ─────────────────────────────────────────────
      - name: 🐍 Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ── 3. Устанавливаем зависимости ──────────────────────────────────────
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Запускаем сборщик ──────────────────────────────────────────────
      - name: 🚀 Run collector
        run: |
          VERBOSE_FLAG=""
          if [ "${{ github.event.inputs.verbose }}" = "true" ]; then
            VERBOSE_FLAG="--verbose"
          fi
          python collector.py \
            --source source.txt \
            --output result.txt \
            $VERBOSE_FLAG

      # ── 5. Краткая статистика в сводке Actions ────────────────────────────
      - name: 📊 Print summary
        run: |
          echo "### 📡 Результаты сборки" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          head -25 result.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          TOTAL=$(grep -v '^#' result.txt | grep -c '://' || true)
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Итого уникальных прокси:** $TOTAL" >> $GITHUB_STEP_SUMMARY

      # ── 6. Коммитим обновлённые файлы обратно в репо ─────────────────────
      - name: 💾 Commit result.txt
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 auto: update proxies [$(date +'%Y-%m-%d %H:%M UTC')]"
          file_pattern: "result.txt collector.log"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
