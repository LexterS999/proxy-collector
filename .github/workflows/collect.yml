name: 🔄 Daily Proxy Collector

on:
  # Автоматический запуск каждый день в 06:00 UTC
  schedule:
    - cron: "0 6 * * *"

  # Ручной запуск через Actions → Run workflow
  workflow_dispatch:
    inputs:
      verbose:
        description: "Подробный лог (verbose mode)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write

jobs:
  collect:
    name: Collect, Check & Publish Proxies
    runs-on: ubuntu-latest
    timeout-minutes: 90   # TCP liveness check + geo на 3000+ хостов

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🐍 Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 Run collector
        run: |
          VERBOSE_FLAG=""
          if [ "${{ github.event.inputs.verbose }}" = "true" ]; then
            VERBOSE_FLAG="--verbose"
          fi
          python collector.py \
            --source  source.txt \
            --output  result.txt \
            --results results \
            $VERBOSE_FLAG

      - name: 📊 Summary
        run: |
          echo "### 📡 Результаты сборки" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          head -30 result.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ALIVE=$(python3 -c "
          import json
          s=json.load(open('stats.json'))
          last=s[-1]
          print(f'Живых: {last[\"alive\"]}/{last[\"unique\"]} ({last[\"alive_pct\"]}%)')
          print(f'Гео покрытие: {last[\"geo_covered\"]} хостов')
          print(f'Источников: {last[\"sources_ok\"]}/{last[\"sources_total\"]}')
          " 2>/dev/null || echo "stats not found")
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "$ALIVE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Файлы по протоколам:**" >> $GITHUB_STEP_SUMMARY
          for f in results/*.txt; do
            COUNT=$(grep -c '://' "$f" 2>/dev/null || echo 0)
            echo "- \`$(basename $f)\`: $COUNT" >> $GITHUB_STEP_SUMMARY
          done

      - name: 💾 Commit all results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 auto: update proxies [$(date +'%Y-%m-%d %H:%M UTC')]"
          file_pattern: "result.txt results/*.txt geo_cache.json stats.json dashboard.html collector.log"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
